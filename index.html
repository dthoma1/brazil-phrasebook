<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇧🇷 Brazil Travel Phrase Book</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #009c3b 0%, #002776 50%, #ffdf00 100%);
    min-height: 100vh; padding: 24px;
    color: #1a1a2e;
  }
  h1 { text-align: center; color: #fff; font-size: 2rem; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .subtitle { text-align: center; color: rgba(255,255,255,.85); margin-bottom: 28px; font-size: 1.05rem; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .filters button {
    background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
    color: #fff; padding: 6px 16px; border-radius: 20px; cursor: pointer;
    font-size: .9rem; transition: .2s;
  }
  .filters button:hover, .filters button.active {
    background: #ffdf00; color: #002776; border-color: #ffdf00; font-weight: 600;
  }
  .grid { max-width: 860px; margin: 0 auto; display: grid; gap: 14px; }
  .card {
    background: #fff; border-radius: 14px; padding: 18px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); display: flex; align-items: center;
    gap: 16px; transition: transform .15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card .text { flex: 1; }
  .pt { font-size: 1.2rem; font-weight: 700; color: #002776; margin-bottom: 4px; }
  .en { font-size: .95rem; color: #555; }
  .tag { display: inline-block; font-size: .7rem; background: #e8f5e9; color: #2e7d32;
    padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .play-btn {
    width: 48px; height: 48px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #009c3b, #006b2b); color: #fff;
    font-size: 1.3rem; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: .2s; box-shadow: 0 3px 10px rgba(0,156,59,.3);
  }
  .play-btn:hover { transform: scale(1.1); }
  .play-btn:active { transform: scale(.95); }
  .play-btn.playing { background: linear-gradient(135deg, #ffdf00, #e6c700); color: #002776; }
  .note { text-align: center; color: rgba(255,255,255,.7); margin-top: 32px; font-size: .85rem; }
  @media (max-width: 500px) {
    body { padding: 14px; }
    h1 { font-size: 1.5rem; }
    .card { padding: 14px; gap: 12px; }
    .pt { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<h1>🇧🇷 Brazil Travel Phrase Book</h1>
<p class="subtitle">Tap 🔊 to hear each phrase in Brazilian Portuguese</p>

<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<p class="note">Audio uses your device's text-to-speech engine · Best on Chrome/Safari</p>

<script>
const phrases = [
  // Essentials
  { pt: "Olá!", en: "Hello!", cat: "Essentials" },
  { pt: "Bom dia", en: "Good morning", cat: "Essentials" },
  { pt: "Boa tarde", en: "Good afternoon", cat: "Essentials" },
  { pt: "Boa noite", en: "Good evening / Good night", cat: "Essentials" },
  { pt: "Tchau!", en: "Bye!", cat: "Essentials" },
  { pt: "Por favor", en: "Please", cat: "Essentials" },
  { pt: "Obrigado", en: "Thank you (said by a man)", cat: "Essentials" },
  { pt: "Obrigada", en: "Thank you (said by a woman)", cat: "Essentials" },
  { pt: "De nada", en: "You're welcome", cat: "Essentials" },
  { pt: "Com licença", en: "Excuse me", cat: "Essentials" },
  { pt: "Desculpa", en: "Sorry", cat: "Essentials" },
  { pt: "Sim", en: "Yes", cat: "Essentials" },
  { pt: "Não", en: "No", cat: "Essentials" },
  { pt: "Tudo bem?", en: "How are you? / Everything okay?", cat: "Essentials" },
  { pt: "Tudo bem!", en: "I'm fine! / All good!", cat: "Essentials" },
  { pt: "Isso é possível?", en: "Is this possible?", cat: "Essentials" },
  { pt: "Talvez", en: "Maybe", cat: "Essentials" },
  { pt: "Quem sabe", en: "Perhaps", cat: "Essentials" },
  { pt: "O que é isso?", en: "What is this?", cat: "Essentials" },
  { pt: "Este aqui, por favor", en: "This one, please", cat: "Essentials" },
  { pt: "Eu cometi um erro", en: "I made a mistake", cat: "Essentials" },
  { pt: "Na verdade", en: "Actually", cat: "Essentials" },

  // Understanding & Language
  { pt: "Eu não entendo", en: "I don't understand", cat: "Language" },
  { pt: "Eu não falo português", en: "I don't speak Portuguese", cat: "Language" },
  { pt: "Você fala inglês?", en: "Do you speak English?", cat: "Language" },
  { pt: "Pode repetir, por favor?", en: "Can you repeat that, please?", cat: "Language" },
  { pt: "Pode falar mais devagar?", en: "Can you speak more slowly?", cat: "Language" },
  { pt: "Como se diz isso em português?", en: "How do you say this in Portuguese?", cat: "Language" },
  { pt: "O que significa isso?", en: "What does that mean?", cat: "Language" },

  // Deflecting & Boundaries
  { pt: "Eu não quero falar sobre política", en: "I don't want to talk about politics", cat: "Deflecting" },
  { pt: "Prefiro não falar sobre isso", en: "I'd rather not talk about that", cat: "Deflecting" },
  { pt: "Não entendo de política brasileira", en: "I don't understand Brazilian politics", cat: "Deflecting" },
  { pt: "Vamos mudar de assunto?", en: "Shall we change the subject?", cat: "Deflecting" },
  { pt: "Estou só curtindo a viagem!", en: "I'm just enjoying the trip!", cat: "Deflecting" },
  { pt: "Eu sou turista, só quero conhecer o Brasil!", en: "I'm a tourist, I just want to see Brazil!", cat: "Deflecting" },
  { pt: "Não tenho opinião sobre isso", en: "I don't have an opinion on that", cat: "Deflecting" },

  // Getting Around
  { pt: "Quanto custa?", en: "How much does it cost?", cat: "Getting Around" },
  { pt: "Pode me levar para este endereço?", en: "Can you take me to this address?", cat: "Getting Around" },
  { pt: "Onde fica…?", en: "Where is…?", cat: "Getting Around" },
  { pt: "Está muito longe?", en: "Is it very far?", cat: "Getting Around" },
  { pt: "Pode parar aqui, por favor?", en: "Can you stop here, please?", cat: "Getting Around" },
  { pt: "Eu estou perdido", en: "I'm lost", cat: "Getting Around" },
  { pt: "Pode chamar um táxi para mim?", en: "Can you call a taxi for me?", cat: "Getting Around" },
  { pt: "Para o aeroporto, por favor", en: "To the airport, please", cat: "Getting Around" },
  { pt: "Aceita cartão?", en: "Do you take card?", cat: "Getting Around" },
  { pt: "Aceita Pix?", en: "Do you take Pix? (Brazil's payment system)", cat: "Getting Around" },
  { pt: "Preciso de troco", en: "I need change", cat: "Getting Around" },

  // Food & Drink
  { pt: "Uma mesa para um, por favor", en: "A table for one, please", cat: "Food & Drink" },
  { pt: "Uma mesa para dois, por favor", en: "A table for two, please", cat: "Food & Drink" },
  { pt: "O cardápio, por favor", en: "The menu, please", cat: "Food & Drink" },
  { pt: "Eu sou vegetariano / vegetariana", en: "I'm vegetarian (m/f)", cat: "Food & Drink" },
  { pt: "Isso é vegetariano?", en: "Is this vegetarian?", cat: "Food & Drink" },
  { pt: "Eu tenho alergia a…", en: "I'm allergic to…", cat: "Food & Drink" },
  { pt: "Uma água, por favor", en: "A water, please", cat: "Food & Drink" },
  { pt: "Uma cerveja, por favor", en: "A beer, please", cat: "Food & Drink" },
  { pt: "Uma caipirinha, por favor", en: "A caipirinha, please", cat: "Food & Drink" },
  { pt: "Um café, por favor", en: "A coffee, please", cat: "Food & Drink" },
  { pt: "A conta, por favor", en: "The check, please", cat: "Food & Drink" },
  { pt: "Está delicioso!", en: "It's delicious!", cat: "Food & Drink" },

  // Emergencies & Safety
  { pt: "Preciso de ajuda!", en: "I need help!", cat: "Emergencies" },
  { pt: "Chame a polícia!", en: "Call the police!", cat: "Emergencies" },
  { pt: "Chame uma ambulância!", en: "Call an ambulance!", cat: "Emergencies" },
  { pt: "Onde fica o hospital mais perto?", en: "Where is the nearest hospital?", cat: "Emergencies" },
  { pt: "Eu preciso de um médico", en: "I need a doctor", cat: "Emergencies" },
  { pt: "Eu perdi meu passaporte", en: "I lost my passport", cat: "Emergencies" },
  { pt: "Onde fica a embaixada americana?", en: "Where is the American embassy?", cat: "Emergencies" },

  // Hotel & Accommodation
  { pt: "Eu tenho uma reserva", en: "I have a reservation", cat: "Hotel" },
  { pt: "Qual é a senha do Wi-Fi?", en: "What's the Wi-Fi password?", cat: "Hotel" },
  { pt: "A que horas é o check-out?", en: "What time is check-out?", cat: "Hotel" },
  { pt: "Pode guardar minha mala?", en: "Can you store my luggage?", cat: "Hotel" },
  { pt: "O ar-condicionado não funciona", en: "The AC isn't working", cat: "Hotel" },

  // Being Friendly
  { pt: "Meu nome é…", en: "My name is…", cat: "Social" },
  { pt: "Muito prazer!", en: "Nice to meet you!", cat: "Social" },
  { pt: "De onde você é?", en: "Where are you from?", cat: "Social" },
  { pt: "Eu sou dos Estados Unidos", en: "I'm from the United States", cat: "Social" },
  { pt: "O Brasil é lindo!", en: "Brazil is beautiful!", cat: "Social" },
  { pt: "Adoro a comida brasileira!", en: "I love Brazilian food!", cat: "Social" },
  { pt: "Posso tirar uma foto?", en: "Can I take a photo?", cat: "Social" },
  { pt: "Saúde!", en: "Cheers! (when drinking)", cat: "Social" },
  { pt: "Valeu!", en: "Thanks! (informal)", cat: "Social" },
];

const categories = [...new Set(phrases.map(p => p.cat))];

// Build filter buttons
const filtersEl = document.getElementById('filters');
const allBtn = document.createElement('button');
allBtn.textContent = 'All';
allBtn.className = 'active';
allBtn.onclick = () => render('All');
filtersEl.appendChild(allBtn);
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.textContent = cat;
  btn.onclick = () => render(cat);
  filtersEl.appendChild(btn);
});

function render(filter) {
  document.querySelectorAll('.filters button').forEach(b => {
    b.classList.toggle('active', b.textContent === filter);
  });
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const list = filter === 'All' ? phrases : phrases.filter(p => p.cat === filter);
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="text">
        <div class="pt">${p.pt}</div>
        <div class="en">${p.en}</div>
        <span class="tag">${p.cat}</span>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'play-btn';
    btn.setAttribute('aria-label', `Play: ${p.pt}`);
    btn.innerHTML = '🔊';
    btn.onclick = () => speak(p.pt, btn);
    card.appendChild(btn);
    grid.appendChild(card);
  });
}

function speak(text, btn) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'pt-BR';
  utter.rate = 0.85;

  // Try to pick a Brazilian Portuguese voice
  const voices = window.speechSynthesis.getVoices();
  const brVoice = voices.find(v => v.lang === 'pt-BR') ||
                  voices.find(v => v.lang.startsWith('pt'));
  if (brVoice) utter.voice = brVoice;

  btn.classList.add('playing');
  utter.onend = () => btn.classList.remove('playing');
  utter.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(utter);
}

// Voices load async in some browsers
window.speechSynthesis.onvoiceschanged = () => {};
render('All');
</script>
</body>
</html>
